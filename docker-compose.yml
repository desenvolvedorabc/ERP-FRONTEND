services:
  frontend:
    build:
      context: .
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: http://localhost:3003
        NEXTAUTH_URL: http://localhost:3000
        NEXTAUTH_SECRET: troque-por-uma-chave-segura
    container_name: erp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3003
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=troque-por-uma-chave-segura
